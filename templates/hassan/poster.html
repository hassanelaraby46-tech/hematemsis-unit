{% extends 'hassan/base.html' %}
{% block content %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <h1 class="text-center mb-4">قائمة الصور</h1>
    <hr>
    <div class="row">
        {% for poster in posters %}
            <div class="col-md-4 mb-4">
                <div class="card h-100">
                    {% if poster.image %}
                        <img src="{{ poster.image.url }}" class="card-img-top" alt="{{ poster.title }}">
                    {% endif %}
                    <div class="card-body">
                        <h5 class="card-title">{{ poster.title }}</h5>
                        <p class="card-text">{{ poster.description|truncatewords:20 }}</p>
                    </div>
                </div>
            </div>
        {% empty %}
            <p class="text-center">لا توجد بوسترات مضافة حالياً.</p>
        {% endfor %}
    </div>
</div>

    {% endblock %}
