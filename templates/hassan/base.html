{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>وحدة القيء الدموي</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { flex: 1; padding: 20px 0; }
        footer { background-color: #2c3e50; color: white; padding: 20px 0; text-align: center; margin-top: auto; }
        #backToTop { z-index: 1000; }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body>
    {% include 'parts/navbar.html' %}

    <main class="container-fluid main-content">
        {% block content %}{% endblock %}
    </main>

    <a href="#" class="btn btn-primary btn-sm position-fixed bottom-0 end-0 m-3" id="backToTop">↑</a>

    <footer>
        <div class="container">
            <p>&copy; {% now "Y" %} جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById("backToTop").addEventListener("click", function(e){
            e.preventDefault();
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
</body>
</html>
